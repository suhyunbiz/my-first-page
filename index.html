<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>행사 참가 신청</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        background: linear-gradient(135deg, #F7F3FF 0%, #F1EBFF 60%, #E8E0FF 100%);
        height: 100vh;
        overflow: hidden;
        color: #2E2E2E;
    }

    /* 상단 헤더 */
    .header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 28px 42px;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(20px);
        z-index: 99;
        border-bottom: 1px solid rgba(255,255,255,0.5);
    }

    .header-title-area {
        display: flex;
        align-items: center;
        gap: 14px;
    }

    .header-icon {
        width: 36px;
        height: 36px;
        filter: drop-shadow(0 3px 6px rgba(0,0,0,0.1));
    }

    .header h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 700;
        color: #6246C7;
    }

    .header p {
        margin: 6px 0 0;
        font-size: 15px;
        color: #6F6F7A;
    }

    /* 전체 레이아웃 */
    .layout {
        display: flex;
        gap: 40px;
        padding: 160px 60px 40px;
        box-sizing: border-box;
        height: 100vh;
    }

    /* 왼쪽 상세 정보 */
    .left {
        flex: 1;
        background: rgba(255,255,255,0.6);
        border-radius: 22px;
        padding: 28px;
        overflow-y: auto;
        height: calc(100vh - 200px);
        backdrop-filter: blur(18px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }

    .info-block {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 22px;
    }

    .info-icon {
        width: 32px;
        height: 32px;
    }

    .left h3 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 700;
        color: #5A45B5;
    }

    .left p {
        margin: 0;
        color: #4C4C53;
        font-size: 15px;
        line-height: 1.55;
    }

    /* 오른쪽 입력 폼 */
    .right {
        width: 420px;
        background: #ffffffdd;
        padding: 34px;
        border-radius: 26px;
        backdrop-filter: blur(20px);
        box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        height: fit-content;
    }

    .right h2 {
        margin: 0 0 24px;
        font-size: 24px;
        color: #5A45B5;
        font-weight: 700;
    }

    .input-box {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        color: #5A45B5;
        font-size: 14px;
        font-weight: 600;
    }

    .input-box input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid #E4DFFF;
        background: #FAF9FF;
        font-size: 15px;
        transition: 0.2s;
    }

    .input-box input:focus {
        outline: none;
        border-color: #B7A4FF;
        box-shadow: 0 0 0 4px rgba(183,164,255,0.28);
        background: #ffffff;
    }

    /* 버튼 */
    .btn {
        margin-top: 12px;
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #B99CFF, #A682FF);
        border: none;
        border-radius: 14px;
        color: white;
        font-size: 17px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s;
        box-shadow: 0 10px 25px rgba(140,114,255,0.25);
    }

    .btn:hover {
        background: linear-gradient(135deg, #A682FF, #926BFF);
        transform: translateY(-1px);
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-thumb {
        background: #CBBDFB;
        border-radius: 6px;
    }

</style>
</head>

<body>

<!-- 헤더 -->
<div class="header">
    <div class="header-title-area">
        <img class="header-icon" src="https://img.icons8.com/fluency/48/event-accepted.png" />
        <h1>행사 참가 신청</h1>
    </div>
    <p>행사 안내를 확인하고 신청 정보를 입력해주세요 💜</p>
</div>

<!-- 레이아웃 -->
<div class="layout">

    <!-- 좌측 상세 정보 -->
    <div class="left">

        <div class="info-block">
            <img class="info-icon" src="https://img.icons8.com/fluency/48/planner.png">
            <div>
                <h3>행사 일정 (가안)</h3>
                <p>2026년 5월 예정 · 추후 확정 공지</p>
            </div>
        </div>

        <div class="info-block">
            <img class="info-icon" src="https://img.icons8.com/fluency/48/marker.png">
            <div>
                <h3>장소</h3>
                <p>사내 강당 또는 외부 공간 (추후 공지)</p>
            </div>
        </div>

        <div class="info-block">
            <img class="info-icon" src="https://img.icons8.com/fluency/48/conference-call.png">
            <div>
                <h3>프로그램 안내 (가안)</h3>
                <p>
                    · 오프닝 및 환영 인사<br>
                    · 주요 세션 발표<br>
                    · 참여형 그룹 활동<br>
                    · Q&A, 네트워킹<br>
                    · 설문 및 종료 안내
                </p>
            </div>
        </div>

        <div class="info-block">
            <img class="info-icon" src="https://img.icons8.com/fluency/48/info.png">
            <div>
                <h3>유의사항</h3>
                <p>
                    - 참석 확인 필수<br>
                    - 행사 시작 10분 전까지 도착<br>
                    - 준비물: 사원증, 필기도구
                </p>
            </div>
        </div>

        <div class="info-block">
            <img class="info-icon" src="https://img.icons8.com/fluency/48/communication.png">
            <div>
                <h3>문의처</h3>
                <p>교육서비스센터 담당자</p>
            </div>
        </div>

    </div>

    <!-- 우측 입력 폼 -->
    <div class="right">
        <h2>신청 정보 입력</h2>

        <div class="input-box">
            <label>이름</label>
            <input type="text" placeholder="홍길동" />
        </div>

        <div class="input-box">
            <label>사번</label>
            <input type="text" placeholder="123456" />
        </div>

        <div class="input-box">
            <label>연락처</label>
            <input type="text" placeholder="010-0000-0000" />
        </div>

        <button class="btn">신청하기</button>
    </div>

</div>

</body>
</html>
