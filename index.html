<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전수현 선임님의 첫 웹페이지</title>
    <style>
        body {
            font-family: "Helvetica", sans-serif;
            background: #f4f4f4;
            padding: 40px;
            text-align: center;
        }
        .box {
            background: white;
            padding: 30px;
            width: 400px;
            margin: auto;
            border-radius: 12px;
            box-shadow: 0px 4px 12px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 20px;
        }
        button {
            padding: 12px 20px;
            background: #0b93f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>👋 안녕하세요!</h1>
        <p>이 웹페이지는 전수현 선임님이 직접 만든 첫 HTML 페이지입니다.</p>
        <p>곧 여기에 톡 UI 챗봇도 추가할 수 있어요!</p>

        <button onclick="alert('HTML 잘 만들고 있어요 👍')">눌러보기</button>
    </div>

</body>
</html>
