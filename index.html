<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>행사 참가 신청</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        background: linear-gradient(135deg, #E5D9F2, #D7C5F8 40%, #C9B7FC 100%);
        color: #1C1C1E;
        height: 100vh;
        overflow: hidden;
    }

    /* 상단 헤더 */
    .header {
        width: 100%;
        padding: 28px 42px;
        box-sizing: border-box;
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(18px);
        position: fixed;
        top: 0;
        left: 0;
        display: flex;
        flex-direction: column;
        z-index: 99;
    }

    .header h1 {
        margin: 0;
        font-size: 26px;
        font-weight: 700;
        color: #4B3D7A;
    }

    .header p {
        margin: 6px 0 0;
        font-size: 15px;
        color: #6E6E73;
    }

    /* 전체 레이아웃 */
    .layout {
        display: flex;
        gap: 40px;
        padding: 150px 60px 40px;
        box-sizing: border-box;
        height: 100vh;
    }

    /* 좌측 상세 정보 */
    .left {
        flex: 1;
        background: rgba(255,255,255,0.5);
        border-radius: 18px;
        padding: 28px;
        overflow-y: auto;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 35px rgba(0,0,0,0.05);
    }

    .left h2 {
        font-size: 20px;
        margin-bottom: 15px;
        color: #4B3D7A;
    }

    .left p {
        line-height: 1.6;
        font-size: 15px;
        color: #3C3C43;
    }

    /* 우측 입력폼 */
    .right {
        width: 380px;
        background: #ffffffcc;
        padding: 32px;
        border-radius: 22px;
        backdrop-filter: blur(10px);
        box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        height: fit-content;
    }

    .right h2 {
        font-size: 22px;
        margin-bottom: 20px;
        color: #4B3D7A;
    }

    .input-box {
        margin-bottom: 18px;
        display: flex;
        flex-direction: column;
    }

    label {
        font-size: 14px;
        margin-bottom: 6px;
        color: #4B3D7A;
        font-weight: 500;
    }

    .input-box input {
        padding: 12px 16px;
        border-radius: 12px;
        border: 1px solid #E6DDF5;
        background: #FBF9FF;
        font-size: 15px;
        transition: 0.2s;
    }

    .input-box input:focus {
        outline: none;
        border-color: #A181FF;
        box-shadow: 0 0 0 4px rgba(161,129,255,0.25);
    }

    .btn {
        width: 100%;
        padding: 15px;
        background: #A181FF;
        border: none;
        color: white;
        margin-top: 8px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 14px;
        cursor: pointer;
        transition: 0.2s;
    }

    .btn:hover {
        background: #8E6BFF;
    }

    /* 스크롤바 예쁘게 */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-thumb {
        background: #C4B5F4;
        border-radius: 4px;
    }

</style>
</head>
<body>

<!-- 상단 헤더 -->
<div class="header">
    <h1>행사 참가 신청</h1>
    <p>아래 정보를 확인하시고 신청 정보를 입력해주세요</p>
</div>

<!-- 전체 레이아웃 -->
<div class="layout">

    <!-- 좌측 상세 영역 -->
    <div class="left">
        <h2>행사 상세 안내(가안)</h2>
        <p>
            - 본 행사는 사내 임직원을 위한 프로그램입니다.<br><br>
            - 일정: 2026년 5월 중 예정<br>
            - 장소: 추후 공지<br><br>
            - 진행 내용:<br>
            ㆍ개회 및 환영 인사<br>
            ㆍ세션 발표<br>
            ㆍ참여형 워크숍<br>
            ㆍQ&A 및 네트워킹<br><br>

            - 준비물: 사원증, 필기도구<br>
            - 문의처: 교육서비스센터 담당자<br><br>

            실제 상세 내용은 선임님이 정리해주시면 여기 정확히 반영해줄게요!
        </p>
    </div>

    <!-- 우측 입력폼 -->
    <div class="right">
        <h2>신청 정보 입력</h2>

        <div class="input-box">
            <label>이름</label>
            <input type="text" placeholder="홍길동" />
        </div>

        <div class="input-box">
            <label>사번</label>
            <input type="text" placeholder="123456" />
        </div>

        <div class="input-box">
            <label>연락처</label>
            <input type="text" placeholder="010-0000-0000" />
        </div>

        <button class="btn">신청하기</button>
    </div>

</div>

</body>
</html>
